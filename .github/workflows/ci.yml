name: ZenithTeams CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar el Repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 21 (Corretto)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      # --- EL TRUCO EN LA NUBE ---
      # Usamos el Gradle global de Ubuntu para crear el archivo gradlew en el momento,
      # y automáticamente le damos permisos de ejecución en Linux.
      - name: Generar Gradle Wrapper dinámicamente
        run: |
          gradle wrapper
          chmod +x ./gradlew

      - name: Compilar y Ejecutar Tests Unitarios
        run: ./gradlew build --no-daemon

      - name: Subir el .JAR generado como Artefacto
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ZenithTeamsFabric-Mod
          path: build/libs/*.jar